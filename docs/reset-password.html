<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://vikingtcg.xyz/favi.png">
    <title>Restablecer Contraseña | Vikingdev TCG</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body class="public-body">
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-container" style="margin-top: 80px; display: none;" id="reset-container">
        <h1 style="text-align: center; margin-bottom: 24px;">Nueva Contraseña</h1>
        <p style="text-align: center; font-size: 0.9rem; color: #888; margin-bottom: 24px;">
            Introduce tu nueva contraseña a continuación para recuperar el acceso a tu cuenta.
        </p>

        <div class="form-group">
            <label>Nueva Contraseña</label>
            <div class="password-input-wrapper">
                <input type="password" id="new-password" placeholder="********">
                <i class="fas fa-eye password-toggle" onclick="togglePassword('new-password')"></i>
            </div>
        </div>

        <div class="form-group">
            <label>Confirmar Contraseña</label>
            <div class="password-input-wrapper">
                <input type="password" id="confirm-password" placeholder="********">
                <i class="fas fa-eye password-toggle" onclick="togglePassword('confirm-password')"></i>
            </div>
        </div>

        <button id="btn-update-password" class="btn" style="width: 100%;">Actualizar Contraseña</button>

        <p style="text-align: center; font-size: 0.8rem; color: #666; margin-top: 20px;">
            Al actualizarla, se cerrarán todas las sesiones activas.
        </p>
    </div>

    <div id="loader-view" style="text-align: center; margin-top: 100px;">
        <div class="loading-message">Verificando enlace...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/reset-password.js"></script>
    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
