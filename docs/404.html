<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Vikingdev TCG</title>
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // https://github.com/rafrex/spa-github-pages
        // This script takes the current url and converts the path into a query parameter,
        // then redirects the browser to the new url with the query parameter and
        // hash fragment.
        var l = window.location;
        var path = l.pathname.split('/').filter(Boolean);

        // If there's at least one path segment, it's likely a store/user identifier
        // Format: vikingtcg.xyz/toonShop
        if (path.length > 0) {
            var identifier = path[0]; // Take the first segment as the store identifier

            // Reconstruct the base path (excluding the identifier)
            var basePath = l.pathname.split('/').slice(0, -1).join('/');
            if (basePath === '') basePath = '';

            var newSearch = (l.search ? l.search + '&' : '?') + 'id=' + identifier;

            l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                basePath + '/public.html' + newSearch + l.hash
            );
        } else {
            // Fallback to index if no path
            l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/index.html');
        }
    </script>
</head>
<body>
</body>
</html>
