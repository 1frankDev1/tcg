<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Vikingdev TCG</title>
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages Redirection Logic
        var l = window.location;
        var path = l.pathname.split('/').filter(Boolean);

        // We assume the last segment before the 404 was the store identifier if it's not a known file
        // Or if we are in a subdirectory environment like /Viking%20TCG/

        // Find if public.html exists in the path
        var publicIndex = path.indexOf('public.html');

        if (path.length > 0) {
            // Logic to handle both root and subdirectory deployments
            // If the last segment is likely a store name (not ending in .html)
            var lastSegment = path[path.length - 1];

            if (!lastSegment.includes('.')) {
                var identifier = lastSegment;
                var basePathSegments = path.slice(0, -1);
                var basePath = '/' + basePathSegments.join('/');
                if (basePath === '/') basePath = '';

                var newSearch = (l.search ? l.search + '&' : '?') + 'id=' + identifier;

                l.replace(
                    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                    basePath + '/public.html' + newSearch + l.hash
                );
            } else {
                // Regular 404 or direct file access that failed
                l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/index.html');
            }
        } else {
            l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/index.html');
        }
    </script>
</head>
<body>
</body>
</html>
