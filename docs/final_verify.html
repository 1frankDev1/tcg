<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Verification</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/barajar.css">
    <style>
        body { background: #000; color: #fff; margin: 0; padding: 20px; }
        .section { margin-bottom: 50px; border: 1px solid #333; padding: 20px; }
    </style>
</head>
<body>
    <div class="section">
        <h2>1. Swiper Mode (Should be 240px wide, centered)</h2>
        <div class="deck-public-item">
            <div class="deck-header-info">
                <h3>Centered Title</h3>
                <div>$99.99</div>
            </div>
            <div class="container deck-carousel-container">
                <div class="swiper swiperyg" style="background: rgba(255,255,255,0.05);">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide card-slot" style="width: 240px; height: 340px; background: #222;">
                            <img src="https://images.pokemontcg.io/base1/4_hires.png" alt="Charizard" style="width: 100%; height: 100%; object-fit: contain;">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>2. List Mode (Should be 3 columns on mobile)</h2>
        <div class="deck-list-modal" style="position: static; transform: none; display: block;">
            <div class="deck-grid-popup">
                <div class="grid-card-item"><img src="https://images.pokemontcg.io/base1/4_hires.png"></div>
                <div class="grid-card-item"><img src="https://images.pokemontcg.io/base1/4_hires.png"></div>
                <div class="grid-card-item"><img src="https://images.pokemontcg.io/base1/4_hires.png"></div>
                <div class="grid-card-item"><img src="https://images.ygoprodeck.com/images/cards/34541863.jpg"></div>
                <div class="grid-card-item"><img src="https://images.ygoprodeck.com/images/cards/34541863.jpg"></div>
                <div class="grid-card-item"><img src="https://images.ygoprodeck.com/images/cards/34541863.jpg"></div>
            </div>
        </div>
    </div>
</body>
</html>
