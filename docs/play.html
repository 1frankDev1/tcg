<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikingdev Play! - Yu-Gi-Oh LP Calculator</title>
    <link rel="icon" type="image/png" href="https://vikingtcg.xyz/favi.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --primary-color: #00d2ff;
            --sum-color: #2ed573;
            --sub-color: #ff4757;
            --div-color: #ffa502;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-radius: 20px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1a2a3a 0%, #000000 100%);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .calculator-container {
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .play-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .play-header h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            flex: 1;
        }

        .back-btn, .btn-reset-top {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .back-btn:hover, .btn-reset-top:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-reset-top {
            background: linear-gradient(135deg, #ff4757, #c0392b);
            border: none;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 180px 1fr;
            gap: 30px;
            align-items: center;
        }

        .player-section {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .player-name-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .player-name {
            background: none;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            text-align: center;
            padding: 5px;
            width: 150px;
            outline: none;
            transition: border-color 0.3s;
        }

        .player-name:focus {
            border-bottom-color: var(--primary-color);
        }

        .lp-display {
            font-size: 6rem;
            font-weight: 800;
            margin: 5px 0;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            transition: color 0.3s, transform 0.1s;
            font-variant-numeric: tabular-nums;
        }

        .lp-adding { color: var(--sum-color); transform: scale(1.1); }
        .lp-subtracting { color: var(--sub-color); transform: scale(0.9); }
        .lp-dividing { color: var(--div-color); transform: scale(0.95); }

        .controls-grid {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .input-group {
            flex: 1;
            max-width: 200px;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 1.8rem;
            text-align: center;
            font-family: inherit;
            font-weight: 700;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
        }

        .btn-side {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            border: none;
            color: black;
            font-weight: 800;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-sum { background-color: var(--sum-color); }
        .btn-sub { background-color: var(--sub-color); }
        .btn-div { background-color: var(--div-color); font-size: 1.2rem; }

        .btn-side:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .btn-side:active {
            transform: scale(0.9);
        }

        .quick-values {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quick-values button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .quick-values button:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-color: var(--primary-color);
        }

        /* Tools Section */
        .tools-section {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tool-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .tool-box:hover {
            transform: scale(1.05);
        }

        .tool-box span {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-color);
        }

        /* Coin styles */
        .coin {
            width: 70px;
            height: 70px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .coin .side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            backface-visibility: hidden;
            border: 3px solid #ffd700;
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: #7f4f24;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .coin .tails {
            transform: rotateY(180deg);
        }

        /* Dice styles */
        .dice {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            color: #111;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.5s;
        }

        .animate-dice {
            animation: roll 0.6s infinite ease-in-out;
        }

        @keyframes roll {
            0% { transform: rotate(0deg) translateY(0); }
            25% { transform: rotate(90deg) translateY(-10px); }
            50% { transform: rotate(180deg) translateY(0); }
            75% { transform: rotate(270deg) translateY(-10px); }
            100% { transform: rotate(360deg) translateY(0); }
        }

        /* Responsiveness */
        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .tools-section {
                flex-direction: row;
                justify-content: center;
                width: 100%;
                gap: 50px;
                margin: 10px 0;
            }

            .lp-display {
                font-size: 5rem;
            }
        }

        @media (max-width: 640px) {
            .calculator-container {
                padding: 10px;
            }

            .player-section {
                padding: 15px;
            }

            .lp-display {
                font-size: 4.5rem;
            }

            .btn-side {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            .input-group input {
                font-size: 1.5rem;
                padding: 10px;
            }

            .play-header h1 {
                font-size: 1rem;
            }

            .back-btn span, .btn-reset-top span {
                display: none;
            }

            .tools-section {
                gap: 30px;
                padding: 15px;
            }
        }

        /* Landscape optimization */
        @media (max-height: 600px) and (orientation: landscape) {
            .calculator-container {
                flex-direction: row;
                flex-wrap: wrap;
                align-items: flex-start;
            }

            .play-header { width: 100%; }

            .main-layout {
                grid-template-columns: 1fr 1fr;
                width: 100%;
            }

            .tools-section {
                width: auto;
                position: fixed;
                bottom: 10px;
                left: 50%;
                transform: translateX(-50%);
                padding: 10px 30px;
                flex-direction: row;
                gap: 20px;
                z-index: 100;
            }

            .tool-box span { display: none; }
            .coin, .dice { width: 40px; height: 40px; font-size: 1.5rem; }
            .coin .side { font-size: 1.2rem; }
            .dice { font-size: 1.8rem; }

            .player-section { padding: 10px; gap: 5px; }
            .lp-display { font-size: 3rem; margin: 0; }
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 25px;
            padding: 35px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 3.5rem;
            color: var(--sub-color);
            margin-bottom: 20px;
        }

        .modal-content h2 {
            margin: 0 0 15px 0;
            font-size: 1.5rem;
            color: white;
        }

        .modal-content p {
            margin: 0 0 30px 0;
            color: #aaa;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-confirm {
            background: var(--sub-color);
            color: white;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .modal-btn:active {
            transform: scale(0.95);
        }

        /* Floating Calculator Styles */
        .floating-calc-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--primary-color);
            color: black;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            z-index: 999;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
        }

        .floating-calc-btn:hover {
            transform: scale(1.1) rotate(15deg);
        }

        .floating-calc-container {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 280px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            user-select: none;
            touch-action: none;
        }

        .floating-calc-container.active {
            display: flex;
            animation: calcIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes calcIn {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .calc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: move;
        }

        .calc-header span {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-color);
        }

        .calc-close {
            background: none;
            border: none;
            color: #ff4757;
            cursor: pointer;
            font-size: 1rem;
        }

        .calc-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            text-align: right;
            font-size: 1.5rem;
            font-weight: 700;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-break: break-all;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .calc-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calc-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-color);
        }

        .calc-btn.op {
            color: var(--primary-color);
        }

        .calc-btn.equal {
            background: var(--primary-color);
            color: black;
            grid-column: span 2;
        }

        .calc-btn.clear {
            color: #ff4757;
        }

        @media (max-width: 640px) {
            .floating-calc-btn {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
            }
            .floating-calc-container {
                right: 20px;
                bottom: 80px;
                width: 260px;
            }
        }

        /* Spirit Styles */
        .spirit-container {
            position: absolute;
            top: -60px;
            right: 10px;
            width: 120px;
            height: 120px;
            z-index: 5;
            pointer-events: none;
        }

        .spirit-viewer {
            width: 100%;
            height: 100%;
            transition: filter 0.3s;
        }

        .spirit-speech-bubble {
            position: absolute;
            top: -40px;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 210, 255, 0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            max-width: 180px;
            width: max-content;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .spirit-speech-bubble.active {
            opacity: 1;
            transform: translateY(0);
        }

        .spirit-speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            right: 20px;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid rgba(0, 210, 255, 0.3);
        }

        .btn-change-spirit {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
            z-index: 6;
            pointer-events: auto;
        }

        .btn-change-spirit:hover {
            background: var(--primary-color);
            color: black;
            transform: rotate(90deg);
        }

        /* Reaction Animations */
        .reaction-damage {
            filter: drop-shadow(0 0 10px #ff4757) brightness(1.5) sepia(1) hue-rotate(-50deg) saturate(5);
            animation: shake 0.5s ease-in-out;
        }

        .reaction-heal {
            filter: drop-shadow(0 0 10px #2ed573) brightness(1.5) sepia(1) hue-rotate(80deg) saturate(5);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* Selection Modal */
        .spirit-selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .spirit-option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .spirit-option:hover {
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--primary-color);
            transform: translateY(-3px);
        }

        .spirit-option span {
            font-size: 0.7rem;
            font-weight: 700;
            color: #aaa;
            text-align: center;
        }

        @media (max-width: 640px) {
            .spirit-container {
                width: 100px;
                height: 100px;
                top: -50px;
            }
            .spirit-speech-bubble {
                font-size: 0.65rem;
                max-width: 140px;
            }
        }

    </style>
</head>
<body class="play-body">
    <div class="calculator-container">
        <header class="play-header">
            <a href="index.html" class="back-btn" onclick="if(window.history.length > 1){ window.history.back(); return false; }"><i class="fas fa-arrow-left"></i> <span>Volver</span></a>
            <h1>Yu-Gi-Oh! Play!</h1>
            <button id="reset-game" class="btn-reset-top" onclick="showResetModal()"><i class="fas fa-redo"></i> <span>Reset</span></button>
        </header>

        <div class="main-layout">
            <!-- Player 1 -->
            <div class="player-section" id="player1">
                <button class="btn-change-spirit" onclick="openSpiritSelection(1)" title="Cambiar Personaje"><i class="fas fa-user-astronaut"></i></button>
                <div class="spirit-container" id="spirit-container-1">
                    <div class="spirit-speech-bubble" id="bubble-1">¡Hola!</div>
                    <model-viewer class="spirit-viewer" id="viewer-1" auto-rotate rotation="0deg 0deg 0deg" interaction-prompt="none" shadow-intensity="1" exposure="1"></model-viewer>
                </div>
                <div class="player-name-container">
                    <input type="text" class="player-name" placeholder="Jugador 1" value="Mi LP">
                </div>
                <div class="lp-display" id="lp-1">8000</div>

                <div class="controls-grid">
                    <button class="btn-side btn-sum" onclick="operate(1, 'sum')" title="Sumar"><i class="fas fa-plus"></i></button>
                    <div class="input-group">
                        <input type="number" id="input-1" placeholder="0" min="0" inputmode="numeric">
                    </div>
                    <button class="btn-side btn-sub" onclick="operate(1, 'sub')" title="Restar"><i class="fas fa-minus"></i></button>
                    <button class="btn-side btn-div" onclick="operate(1, 'div')" title="Dividir entre 2">/2</button>
                </div>

                <div class="quick-values">
                    <button onclick="setInputValue(1, 500)">500</button>
                    <button onclick="setInputValue(1, 1000)">1000</button>
                    <button onclick="setInputValue(1, 2000)">2000</button>
                    <button onclick="setInputValue(1, 4000)">4000</button>
                    <button onclick="clearInput(1)"><i class="fas fa-times"></i></button>
                </div>
            </div>

            <!-- Center Tools -->
            <div class="tools-section">
                <div class="tool-box" onclick="flipCoin()">
                    <div id="coin" class="coin">
                        <div class="side heads"><i class="fas fa-circle-user"></i></div>
                        <div class="side tails"><i class="fas fa-crown"></i></div>
                    </div>
                    <span id="coin-result">Moneda</span>
                </div>

                <div class="tool-box" onclick="rollDice()">
                    <div id="dice" class="dice">
                        <i class="fas fa-dice-one"></i>
                    </div>
                    <span id="dice-result">Dado</span>
                </div>
            </div>

            <!-- Player 2 -->
            <div class="player-section" id="player2">
                <button class="btn-change-spirit" onclick="openSpiritSelection(2)" title="Cambiar Personaje"><i class="fas fa-user-astronaut"></i></button>
                <div class="spirit-container" id="spirit-container-2">
                    <div class="spirit-speech-bubble" id="bubble-2">¡Suerte!</div>
                    <model-viewer class="spirit-viewer" id="viewer-2" auto-rotate rotation="0deg 0deg 0deg" interaction-prompt="none" shadow-intensity="1" exposure="1"></model-viewer>
                </div>
                <div class="player-name-container">
                    <input type="text" class="player-name" placeholder="Jugador 2" value="Oponente">
                </div>
                <div class="lp-display" id="lp-2">8000</div>

                <div class="controls-grid">
                    <button class="btn-side btn-sum" onclick="operate(2, 'sum')" title="Sumar"><i class="fas fa-plus"></i></button>
                    <div class="input-group">
                        <input type="number" id="input-2" placeholder="0" min="0" inputmode="numeric">
                    </div>
                    <button class="btn-side btn-sub" onclick="operate(2, 'sub')" title="Restar"><i class="fas fa-minus"></i></button>
                    <button class="btn-side btn-div" onclick="operate(2, 'div')" title="Dividir entre 2">/2</button>
                </div>

                <div class="quick-values">
                    <button onclick="setInputValue(2, 500)">500</button>
                    <button onclick="setInputValue(2, 1000)">1000</button>
                    <button onclick="setInputValue(2, 2000)">2000</button>
                    <button onclick="setInputValue(2, 4000)">4000</button>
                    <button onclick="clearInput(2)"><i class="fas fa-times"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Reset Modal -->
    <div id="reset-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <h2>¿Reiniciar partida?</h2>
            <p>Se restablecerán ambos contadores a 8000 LP y se limpiarán los resultados de los dados y la moneda.</p>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" onclick="closeResetModal()">Cancelar</button>
                <button class="modal-btn btn-confirm" onclick="confirmReset()">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Spirit Selection Modal -->
    <div id="spirit-selection-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 600px;">
            <h2>Seleccionar Personaje</h2>
            <p>Elige el compañero para el Jugador <span id="selecting-player-idx">1</span></p>
            <div class="spirit-selection-grid" id="spirit-options-grid">
                <!-- Spirits will be loaded here -->
            </div>
            <div class="modal-actions" style="margin-top: 20px;">
                <button class="modal-btn btn-cancel" onclick="closeSpiritSelection()">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Floating Calculator -->
    <button class="floating-calc-btn" onclick="toggleCalculator()" title="Calculadora">
        <i class="fas fa-calculator"></i>
    </button>

    <div id="floating-calculator" class="floating-calc-container">
        <div class="calc-header" id="calc-header">
            <span>Calculadora</span>
            <button class="calc-close" onclick="toggleCalculator()"><i class="fas fa-times"></i></button>
        </div>
        <div class="calc-display" id="calc-display">0</div>
        <div class="calc-grid">
            <button class="calc-btn clear" onclick="handleCalcInput('C')">C</button>
            <button class="calc-btn op" onclick="handleCalcInput('/')">/</button>
            <button class="calc-btn op" onclick="handleCalcInput('*')">×</button>
            <button class="calc-btn op" onclick="handleCalcInput('-')">-</button>

            <button class="calc-btn" onclick="handleCalcInput('7')">7</button>
            <button class="calc-btn" onclick="handleCalcInput('8')">8</button>
            <button class="calc-btn" onclick="handleCalcInput('9')">9</button>
            <button class="calc-btn op" onclick="handleCalcInput('+')">+</button>

            <button class="calc-btn" onclick="handleCalcInput('4')">4</button>
            <button class="calc-btn" onclick="handleCalcInput('5')">5</button>
            <button class="calc-btn" onclick="handleCalcInput('6')">6</button>
            <button class="calc-btn" onclick="handleCalcInput('0')">0</button>

            <button class="calc-btn" onclick="handleCalcInput('1')">1</button>
            <button class="calc-btn" onclick="handleCalcInput('2')">2</button>
            <button class="calc-btn" onclick="handleCalcInput('3')">3</button>
            <button class="calc-btn equal" onclick="handleCalcInput('=')">=</button>
        </div>
    </div>

    <script>
        let lp = [8000, 8000];
        let animationRefs = [null, null];

        // Spirit Logic
        let availableSpirits = [];
        let playerSpirits = [null, null];
        let selectingForPlayer = 1;
        let currentUser = null;

        async function initSpirits() {
            // Check session like in admin.js
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                const { data: user } = await _supabase
                    .from('usuarios')
                    .select('id, role, allowed_spirit_ids, selected_spirit_id')
                    .eq('id', session.user.id)
                    .single();
                currentUser = user;
                if (user) {
                    await loadAvailableSpirits(user);
                }
            } else {
                // Fallback for public or if no session
                await loadAvailableSpirits(null);
            }

            // Load saved spirits from localStorage
            const savedP1 = localStorage.getItem('viking_play_spirit_1');
            const savedP2 = localStorage.getItem('viking_play_spirit_2');

            if (savedP1) setPlayerSpirit(1, JSON.parse(savedP1));
            else if (currentUser && currentUser.selected_spirit_id) {
                // Use user's selected spirit as default for P1
                const defaultSpirit = availableSpirits.find(s => s.id == currentUser.selected_spirit_id);
                if (defaultSpirit) setPlayerSpirit(1, defaultSpirit);
            } else if (availableSpirits.length > 0) {
                setPlayerSpirit(1, availableSpirits[0]);
            }

            if (savedP2) setPlayerSpirit(2, JSON.parse(savedP2));
            else if (availableSpirits.length > 1) {
                setPlayerSpirit(2, availableSpirits[1]);
            } else if (availableSpirits.length > 0) {
                setPlayerSpirit(2, availableSpirits[0]);
            }
        }

        async function loadAvailableSpirits(user) {
            const { data: spirits, error } = await _supabase
                .from('spirits')
                .select('*')
                .order('name', { ascending: true });

            if (error) {
                console.error("Error loading spirits:", error);
                return;
            }

            // Filter spirits based on user permissions (logic from admin.js)
            availableSpirits = spirits.filter(spirit => {
                if (!user) return spirit.is_public !== false && spirit.name.toLowerCase().includes('winged kuriboh');

                let isAllowed = false;
                if (user.role === 'premium' || user.role === 'admin' || user.role === 'admin_store') {
                    isAllowed = true;
                } else if (spirit.name.toLowerCase().includes('winged kuriboh')) {
                    isAllowed = true;
                }

                if (user.allowed_spirit_ids === 'all') {
                    isAllowed = true;
                } else if (user.allowed_spirit_ids && user.allowed_spirit_ids !== '1' && user.allowed_spirit_ids !== '') {
                    const allowedIds = user.allowed_spirit_ids.split(',').map(s => s.trim());
                    if (allowedIds.includes(spirit.id.toString())) {
                        isAllowed = true;
                    }
                }
                return isAllowed;
            });
        }

        function openSpiritSelection(playerIdx) {
            selectingForPlayer = playerIdx;
            document.getElementById('selecting-player-idx').innerText = playerIdx;
            const grid = document.getElementById('spirit-options-grid');
            grid.innerHTML = '';

            availableSpirits.forEach(spirit => {
                const opt = document.createElement('div');
                opt.className = 'spirit-option';
                opt.innerHTML = `
                    <model-viewer src="${spirit.gltf_url}" style="width: 80px; height: 80px;" auto-rotate interaction-prompt="none"></model-viewer>
                    <span>${spirit.name}</span>
                `;
                opt.onclick = () => {
                    setPlayerSpirit(playerIdx, spirit);
                    closeSpiritSelection();
                };
                grid.appendChild(opt);
            });

            document.getElementById('spirit-selection-modal').classList.add('active');
        }

        function closeSpiritSelection() {
            document.getElementById('spirit-selection-modal').classList.remove('active');
        }

        function setPlayerSpirit(playerIdx, spirit) {
            playerSpirits[playerIdx - 1] = spirit;
            localStorage.setItem(`viking_play_spirit_${playerIdx}`, JSON.stringify(spirit));

            const viewer = document.getElementById(`viewer-${playerIdx}`);
            viewer.src = spirit.gltf_url;
            viewer.scale = `${spirit.scale || 1} ${spirit.scale || 1} ${spirit.scale || 1}`;

            triggerReaction(playerIdx, 'greet');
        }

        function triggerReaction(playerIdx, type, value) {
            const bubble = document.getElementById(`bubble-${playerIdx}`);
            const viewer = document.getElementById(`viewer-${playerIdx}`);
            if (!bubble || !viewer) return;

            let message = "";
            let animClass = "";

            switch(type) {
                case 'greet':
                    message = "¡Listo para el duelo!";
                    break;
                case 'damage':
                    message = `¡Auch! Perdimos ${value} LP`;
                    animClass = 'reaction-damage';
                    break;
                case 'heal':
                    message = `¡Genial! Ganamos ${value} LP`;
                    animClass = 'reaction-heal';
                    break;
                case 'dice':
                    if (value >= 4) message = `¡Salió ${value}! ¡Qué suerte!`;
                    else message = `¡Salió ${value}! Podría ser peor...`;
                    break;
                case 'coin':
                    message = `Salió ${value}`;
                    break;
                case 'reset':
                    message = "¡Partida reiniciada!";
                    break;
            }

            if (message) {
                bubble.innerText = message;
                bubble.classList.add('active');
                if (animClass) {
                    viewer.classList.add(animClass);
                }

                setTimeout(() => {
                    bubble.classList.remove('active');
                    if (animClass) {
                        viewer.classList.remove(animClass);
                    }
                }, 3000);
            }
        }

        document.addEventListener('DOMContentLoaded', initSpirits);


        // Calculator Logic
        let calcExpression = '';
        const calcDisplay = document.getElementById('calc-display');

        function toggleCalculator() {
            const calc = document.getElementById('floating-calculator');
            calc.classList.toggle('active');
            if (!calc.classList.contains('active')) {
                handleCalcInput('C');
            }
        }

        function handleCalcInput(input) {
            if (input === 'C') {
                calcExpression = '';
                updateCalcDisplay('0');
            } else if (input === '=') {
                evaluateCalcExpression();
            } else {
                // Prevent starting with operators except minus
                if (calcExpression === '' && ['+', '*', '/'].includes(input)) return;

                // Prevent double operators
                const lastChar = calcExpression.slice(-1);
                if (['+', '-', '*', '/'].includes(lastChar) && ['+', '-', '*', '/'].includes(input)) {
                    calcExpression = calcExpression.slice(0, -1) + input;
                } else {
                    calcExpression += input;
                }
                updateCalcDisplay(calcExpression);
            }
        }

        function updateCalcDisplay(val) {
            calcDisplay.innerText = val.replace(/\*/g, '×').replace(/\//g, '÷') || '0';
        }

        function evaluateCalcExpression() {
            if (!calcExpression) return;
            try {
                // Use a safe evaluation (only numbers and basic operators)
                // We'll use a simple approach for this basic calculator
                let result = eval(calcExpression);
                if (result === Infinity || isNaN(result)) {
                    updateCalcDisplay('Error');
                    calcExpression = '';
                } else {
                    // Limit decimals
                    result = Math.round(result * 100) / 100;
                    calcExpression = result.toString();
                    updateCalcDisplay(calcExpression);
                }
            } catch (e) {
                updateCalcDisplay('Error');
                calcExpression = '';
            }
        }

        // Draggable Logic
        const calcContainer = document.getElementById('floating-calculator');
        const calcHeader = document.getElementById('calc-header');
        let isDragging = false;
        let currentX;
        let currentY;
        let initialX;
        let initialY;
        let xOffset = 0;
        let yOffset = 0;

        calcHeader.addEventListener('mousedown', dragStart);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', dragEnd);

        calcHeader.addEventListener('touchstart', dragStart, { passive: false });
        document.addEventListener('touchmove', drag, { passive: false });
        document.addEventListener('touchend', dragEnd);

        function dragStart(e) {
            if (e.type === 'touchstart') {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }

            if (e.target === calcHeader || calcHeader.contains(e.target)) {
                isDragging = true;
                if (e.type === 'touchstart') e.preventDefault();
            }
        }

        function drag(e) {
            if (isDragging) {
                if (e.type === 'touchmove') {
                    e.preventDefault();
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }

                xOffset = currentX;
                yOffset = currentY;

                setTranslate(currentX, currentY, calcContainer);
            }
        }

        function setTranslate(xPos, yPos, el) {
            el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`;
        }

        function dragEnd() {
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
        }

        const diceIcons = [
            'fa-dice-one', 'fa-dice-two', 'fa-dice-three',
            'fa-dice-four', 'fa-dice-five', 'fa-dice-six'
        ];

        function getRandomInt(max) {
            const array = new Uint32Array(1);
            crypto.getRandomValues(array);
            return array[0] % max;
        }

        function operate(playerIdx, type) {
            const index = playerIdx - 1;
            const inputEl = document.getElementById(`input-${playerIdx}`);
            const displayEl = document.getElementById(`lp-${playerIdx}`);
            const value = parseInt(inputEl.value) || 0;

            if (value === 0 && type !== 'div') return;

            let startValue = lp[index];
            let endValue = startValue;

            if (type === 'sum') {
                endValue += value;
                animateValue(displayEl, startValue, endValue, 'lp-adding');
                triggerReaction(playerIdx, 'heal', value);
            } else if (type === 'sub') {
                endValue -= value;
                if (endValue < 0) endValue = 0;
                animateValue(displayEl, startValue, endValue, 'lp-subtracting');
                triggerReaction(playerIdx, 'damage', value);
            } else if (type === 'div') {
                const diff = startValue - Math.floor(startValue / 2);
                endValue = Math.floor(startValue / 2);
                animateValue(displayEl, startValue, endValue, 'lp-dividing');
                triggerReaction(playerIdx, 'damage', diff);
            }

            lp[index] = endValue;
            inputEl.value = '';
        }

        function animateValue(el, start, end, className) {
            const playerIdx = el.id.split('-')[1] - 1;
            if (animationRefs[playerIdx]) {
                cancelAnimationFrame(animationRefs[playerIdx]);
            }

            const duration = 400; // Faster animation
            const startTime = performance.now();

            el.classList.remove('lp-adding', 'lp-subtracting', 'lp-dividing');
            el.classList.add(className);

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Ease out cubic
                const easeProgress = 1 - Math.pow(1 - progress, 3);

                const currentValue = Math.floor(start + (end - start) * easeProgress);
                el.innerText = currentValue;

                if (progress < 1) {
                    animationRefs[playerIdx] = requestAnimationFrame(update);
                } else {
                    el.innerText = end;
                    animationRefs[playerIdx] = null;
                    setTimeout(() => el.classList.remove(className), 300);
                }
            }

            animationRefs[playerIdx] = requestAnimationFrame(update);
        }

        function setInputValue(playerIdx, val) {
            const el = document.getElementById(`input-${playerIdx}`);
            const current = parseInt(el.value) || 0;
            el.value = current + val;
        }

        function clearInput(playerIdx) {
            document.getElementById(`input-${playerIdx}`).value = '';
        }

        function showResetModal() {
            document.getElementById('reset-modal').classList.add('active');
        }

        function closeResetModal() {
            document.getElementById('reset-modal').classList.remove('active');
        }

        function confirmReset() {
            resetGame();
            closeResetModal();
        }

        function resetGame() {
            lp = [8000, 8000];
            document.getElementById('lp-1').innerText = 8000;
            document.getElementById('lp-2').innerText = 8000;
            document.getElementById('input-1').value = '';
            document.getElementById('input-2').value = '';
            document.getElementById('coin-result').innerText = 'Moneda';
            document.getElementById('dice-result').innerText = 'Dado';

            // Cancel any ongoing animations
            animationRefs.forEach((ref, idx) => {
                if (ref) cancelAnimationFrame(ref);
                animationRefs[idx] = null;
            });

            // Clear animation classes
            document.getElementById('lp-1').className = 'lp-display';
            document.getElementById('lp-2').className = 'lp-display';

            triggerReaction(1, 'reset');
            triggerReaction(2, 'reset');
        }

        let isFlipping = false;
        let coinRotation = 0;
        function flipCoin() {
            if (isFlipping) return;
            isFlipping = true;
            const coin = document.getElementById('coin');
            const resultText = document.getElementById('coin-result');

            resultText.innerText = 'Girando...';

            const isHeads = getRandomInt(2) === 0;
            const result = isHeads ? 'Cara' : 'Cruz';

            // Add at least 5 full rotations (1800 deg)
            const extraRotations = 5 + getRandomInt(5);
            const currentFullRotations = Math.floor(coinRotation / 360);
            coinRotation = (currentFullRotations + extraRotations) * 360 + (isHeads ? 0 : 180);

            coin.style.transform = `rotateY(${coinRotation}deg)`;

            setTimeout(() => {
                resultText.innerText = result;
                isFlipping = false;
                triggerReaction(1, 'coin', result);
                triggerReaction(2, 'coin', result);
            }, 1000);
        }

        let isRolling = false;
        function rollDice() {
            if (isRolling) return;
            isRolling = true;
            const dice = document.getElementById('dice');
            const resultText = document.getElementById('dice-result');

            dice.classList.add('animate-dice');
            resultText.innerText = 'Lanzando...';

            let rolls = 0;
            const interval = setInterval(() => {
                const randomIdx = getRandomInt(6);
                dice.innerHTML = `<i class="fas ${diceIcons[randomIdx]}"></i>`;
                rolls++;
                if (rolls > 15) {
                    clearInterval(interval);
                    const finalVal = getRandomInt(6);
                    const result = finalVal + 1;
                    dice.innerHTML = `<i class="fas ${diceIcons[finalVal]}"></i>`;
                    dice.classList.remove('animate-dice');
                    resultText.innerText = `Resultado: ${result}`;
                    isRolling = false;
                    triggerReaction(1, 'dice', result);
                    triggerReaction(2, 'dice', result);
                }
            }, 60);
        }
    </script>
</body>
</html>
